<body>
    <h1>QR Peach Demo</h1>
  <p>This page is a lightweight browser validation page: generate one SVG QR code and confirm qrpeach.js behavior in a real runtime.</p>
  <div id="qr"></div>
  <script src="https://cdn.jsdelivr.net/npm/qrpeach@latest/qrpeach.min.js"></script>
  <script>
    async function main() {
      const api = window.QRPeach;
      if (!api) {
        throw new Error('QRPeach failed to load from cdn.jsdelivr.net.');
      }

      const asset = await api.Generate({
        type: 'text',
        inputs: { value: 'This is a test' },
        version: 2,
        ecc: 'M'
      }, 'svg', {
        cellSize: 10,
        marginModules: 4
      });

      document.getElementById('qr').innerHTML = asset.svg;
    }

    main();
  </script>
